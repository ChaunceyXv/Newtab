<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>新标签页</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <main class="newtab-main">
    <section class="search-container">
      <h1 class="greeting">你好</h1>
      <form class="search-form" id="searchForm" autocomplete="off">
        <select class="engine-select" id="engineSelect" title="选择搜索引擎">
          <option value="google">Google</option>
          <option value="bing">Bing</option>
          <option value="baidu">百度</option>
          <option value="duckduckgo">DuckDuckGo</option>
        </select>
        <input
          type="text"
          class="search-input"
          id="searchInput"
          placeholder="搜索或输入网址..."
          autofocus
        />
        <button type="submit" class="search-button" aria-label="搜索">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="7"></circle>
            <path d="m21 21-4.3-4.3"></path>
          </svg>
        </button>
      </form>
    </section>
  </main>

  <script type="module" src="js/main.js"></script>
</body>
</html>
